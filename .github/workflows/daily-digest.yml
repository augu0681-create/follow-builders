name: Daily AI Builders Digest
on:
  schedule:
    - cron: '2 2 * * *'
  workflow_dispatch: {}
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: cd scripts && (npm ci || npm install)
      - name: Prepare + remix + deliver
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEISHU_WEBHOOK:     ${{ secrets.FEISHU_WEBHOOK }}
          DIGEST_LANG: 'zh'
        run: node scripts/remix-and-deliver.js
