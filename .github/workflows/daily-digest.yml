name: Daily AI Builders Digest

on:
  schedule:
    - cron: '2 2 * * *'
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: cd scripts && (npm ci || npm install)
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Prepare + remix + deliver
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FEISHU_APP_ID:           ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:       ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID:       ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_ID_TYPE:  ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
          DIGEST_LANG: 'zh'
        run: node scripts/remix-and-deliver.js
